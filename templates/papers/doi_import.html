{% extends "base.html" %}

{% block title %}Import DOI — LitWise{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Import by DOI</h1>
    <form method="post" class="bg-white shadow rounded-lg p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label for="id_doi" class="block text-sm font-medium text-gray-700 mb-1">{{ form.doi.label }}</label>
            {{ form.doi }}
            {% if form.doi.errors %}
            <p class="text-red-600 text-sm mt-1">{{ form.doi.errors.0 }}</p>
            {% endif %}
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded text-sm font-medium hover:bg-indigo-700">
            Import
        </button>
    </form>
</div>
{% endblock %}
