<!DOCTYPE html>
<html lang="en-gb">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}LitWise{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="{% url 'papers:paper_list' %}" class="text-xl font-bold text-indigo-600">LitWise</a>
            {% if user.is_authenticated %}
            <div class="flex items-center gap-4 text-sm">
                <a href="{% url 'papers:paper_list' %}" class="text-gray-700 hover:text-indigo-600">Papers</a>
                <a href="{% url 'papers:doi_import' %}" class="text-gray-700 hover:text-indigo-600">Import DOI</a>
                <a href="{% url 'papers:pdf_upload' %}" class="text-gray-700 hover:text-indigo-600">Upload PDF</a>
                <a href="{% url 'papers:search_papers' %}" class="text-gray-700 hover:text-indigo-600">Search</a>
                <span class="text-gray-400">|</span>
                <span class="text-gray-500">{{ user.username }}</span>
                <a href="{% url 'logout' %}" class="text-gray-500 hover:text-red-600">Log out</a>
            </div>
            {% else %}
            <a href="{% url 'login' %}" class="text-sm text-indigo-600 hover:text-indigo-800">Log in</a>
            {% endif %}
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-6">
        {% if messages %}
        <div class="mb-4 space-y-2">
            {% for message in messages %}
            <div class="px-4 py-3 rounded text-sm
                {% if message.tags == 'success' %}bg-green-100 text-green-800
                {% elif message.tags == 'error' %}bg-red-100 text-red-800
                {% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-800
                {% else %}bg-blue-100 text-blue-800{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
