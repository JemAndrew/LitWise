{% extends "base.html" %}

{% block title %}Log in — LitWise{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-12">
    <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Log in</h1>
    <form method="post" class="bg-white shadow rounded-lg p-6 space-y-4">
        {% csrf_token %}
        {% if form.errors %}
        <div class="bg-red-100 text-red-800 text-sm px-4 py-3 rounded">
            Invalid username or password.
        </div>
        {% endif %}
        <div>
            <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" name="username" id="id_username" autofocus
                   class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
            <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" id="id_password"
                   class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 rounded text-sm font-medium hover:bg-indigo-700">
            Log in
        </button>
        <input type="hidden" name="next" value="{{ next }}">
    </form>
</div>
{% endblock %}
